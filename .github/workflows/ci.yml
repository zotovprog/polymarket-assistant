name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-safety:
    name: Repo Safety Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate repo safety rules
        run: ./tools/check_repo_safety.sh

  secret-scan-gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    needs: repo-safety
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION="8.24.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks on git history
        run: |
          gitleaks git \
            --redact \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --verbose

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif

      - name: Upload gitleaks artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif

  secret-scan-trufflehog:
    name: Secret Scan (trufflehog)
    runs-on: ubuntu-latest
    needs: repo-safety
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run trufflehog on git history
        run: |
          docker run --rm -v "${PWD}:/repo" trufflesecurity/trufflehog:latest \
            git "file:///repo" \
            --results=verified,unknown \
            --fail \
            --json > trufflehog.json

      - name: Upload trufflehog artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-json
          path: trufflehog.json

  tests:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: repo-safety
    env:
      PM_WEB_ACCESS_KEY: ci-test-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: |
          python -m pytest -q \
            tests/test_mm_v2.py \
            tests/test_mm_v2_pnl_accounting.py \
            tests/test_mm_v2_quote_skew.py \
            tests/test_mm_v2_inventory_modes.py \
            tests/test_mm_v2_runtime_skew_flow.py \
            tests/test_mm_v2_sell_release_lag.py \
            tests/test_mm_v2_paper.py \
            tests/test_mm_v2_paper_multiwindow.py \
            tests/test_mm_v2_replay.py \
            tests/test_pair_arb.py \
            tests/test_safe_exec.py

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - tests
      - secret-scan-gitleaks
      - secret-scan-trufflehog
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build -f Dockerfile --target test -t polymarket-assistant:test-${{ github.sha }} .

      - name: Build production image
        run: docker build -f Dockerfile --target production -t polymarket-assistant:prod-${{ github.sha }} .
