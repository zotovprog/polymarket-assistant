variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE/polymarketbot
  GIT_STRATEGY: clone
  CI_PY_DEPS: .ci_deps

stages:
  - test
  - build
  - deploy


Tests:
  stage: test
  tags:
    - shell
    - rabbit2
  script:
    - rm -rf "$CI_PY_DEPS"
    - |
      if python3 -m pip --version >/dev/null 2>&1; then
        PIP_CMD="python3 -m pip"
      elif command -v pip3 >/dev/null 2>&1; then
        PIP_CMD="pip3"
      else
        echo "python3 -m pip or pip3 is required on the runner"
        exit 1
      fi
      $PIP_CMD install --target "$CI_PY_DEPS" -r requirements.txt
    - >
      PYTHONPATH="$CI_PY_DEPS:src"
      python3 -m pytest -q
      tests/test_acceptance_minimal.py
      tests/test_reconciliation.py
      tests/test_batch_runtime_guards.py
      tests/test_session_cap_guards.py
      tests/test_bug_fixes.py
      tests/test_telegram_conflict.py
      tests/test_runtime_metrics.py
  after_script:
    - rm -rf "$CI_PY_DEPS"


BacktestSmoke:
  stage: test
  tags:
    - shell
    - rabbit2
  script:
    - rm -rf "$CI_PY_DEPS"
    - rm -f backtest_smoke.txt && touch backtest_smoke.txt
    - |
      if python3 -m pip --version >/dev/null 2>&1; then
        PIP_CMD="python3 -m pip"
      elif command -v pip3 >/dev/null 2>&1; then
        PIP_CMD="pip3"
      else
        echo "python3 -m pip or pip3 is required on the runner" | tee -a backtest_smoke.txt
        exit 1
      fi
      $PIP_CMD install --target "$CI_PY_DEPS" -r requirements.txt
    - PYTHONPATH="$CI_PY_DEPS:src" python3 backtest/run_backtest.py | tee -a backtest_smoke.txt
  artifacts:
    when: always
    paths:
      - backtest_smoke.txt
  after_script:
    - rm -rf "$CI_PY_DEPS"


Build:
  stage: build
  tags:
    - shell
    - rabbit2
  when: manual
  script:
    - echo "$SMTH_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$SMTH_REGISTRY_USER" --password-stdin
    - >
      docker build -f Dockerfile --target production
      --build-arg GIT_HASH=${CI_COMMIT_SHORT_SHA}
      --tag ${IMAGE_NAME}:${CI_PIPELINE_IID}
      --label CI_PROJECT_ID=${CI_PROJECT_ID}
      .
    - docker push --quiet ${IMAGE_NAME}:${CI_PIPELINE_IID}
    - docker image prune --all --force --filter="label=CI_PROJECT_ID=${CI_PROJECT_ID}" --filter="until=1h"


Deploy:
  stage: deploy
  needs:
    - job: Build
  tags:
    - shell
    - polybot2
  environment:
    name: prod
  variables:
    REF_FILE_VAR_PROD: $PROD_ENV
  script:
    - cat $REF_FILE_VAR_PROD > .env
    - echo "$SMTH_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$SMTH_REGISTRY_USER" --password-stdin
    - docker pull --quiet ${IMAGE_NAME}:${CI_PIPELINE_IID}
    - docker image tag ${IMAGE_NAME}:${CI_PIPELINE_IID} ${IMAGE_NAME}:${CI_ENVIRONMENT_NAME}
    - docker push --quiet ${IMAGE_NAME}:${CI_ENVIRONMENT_NAME}
    - docker stack deploy -c deploy_prod.yaml --with-registry-auth Prod-polymarketbot
