variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE
  GIT_STRATEGY: clone

stages:
  - test
  - build
  - deploy

# ── Tests ──────────────────────────────────────────────────
Test:
  stage: test
  tags:
    - shell
    - rabbit2
  script:
    - docker build --target test -t ${IMAGE_NAME}:test-${CI_PIPELINE_IID} .
    - docker run --rm ${IMAGE_NAME}:test-${CI_PIPELINE_IID}
    - docker image rm ${IMAGE_NAME}:test-${CI_PIPELINE_IID} || true
  only:
    refs:
      - main
      - merge_requests

# ── Build ──────────────────────────────────────────────────
Build:
  stage: build
  tags:
    - shell
    - rabbit2
  when: manual
  script:
    - >
      docker build -f Dockerfile --target production
      --tag ${IMAGE_NAME}:${CI_PIPELINE_IID}
      --label CI_PROJECT_ID=${CI_PROJECT_ID}
      .
    - docker push --quiet ${IMAGE_NAME}:${CI_PIPELINE_IID}
    - docker image prune --all --force --filter="label=CI_PROJECT_ID=${CI_PROJECT_ID}" --filter="until=1h"

# ── Deploy ─────────────────────────────────────────────────
# CI/CD Variables (Settings → CI/CD → Variables):
#   PROD_ENV  - type: File, contents of .env
Deploy:
  stage: deploy
  needs:
    - job: Build
  tags:
    - shell
    - mgr-1n
  only:
    refs:
      - main
  environment:
    name: prod
  variables:
    REF_FILE_VAR_PROD: $PROD_ENV
  script:
    - cat $REF_FILE_VAR_PROD > .env
    - docker pull --quiet ${IMAGE_NAME}:${CI_PIPELINE_IID}
    - docker image tag ${IMAGE_NAME}:${CI_PIPELINE_IID} ${IMAGE_NAME}:${CI_ENVIRONMENT_NAME}
    - docker push --quiet ${IMAGE_NAME}:${CI_ENVIRONMENT_NAME}
    - docker stack deploy -c deploy_prod.yaml --with-registry-auth Prod-polymarketbot
