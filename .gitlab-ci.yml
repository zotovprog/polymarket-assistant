variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE/polymarketbot
  GIT_STRATEGY: clone

stages:
  - test
  - build
  - deploy


Test:
  stage: test
  tags:
    - shell
    - rabbit2
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  variables:
    PM_WEB_ACCESS_KEY: ci-test-key
  script:
    - docker build -f Dockerfile --target test --tag ${IMAGE_NAME}:test-${CI_PIPELINE_IID} .
    - >
      docker run --rm
      -e PM_WEB_ACCESS_KEY=${PM_WEB_ACCESS_KEY}
      ${IMAGE_NAME}:test-${CI_PIPELINE_IID}
      python -m pytest -q
      tests/test_mm_v2.py
      tests/test_mm_v2_pnl_accounting.py
      tests/test_mm_v2_quote_skew.py
      tests/test_mm_v2_inventory_modes.py
      tests/test_mm_v2_runtime_skew_flow.py
      tests/test_mm_v2_sell_release_lag.py
      tests/test_mm_v2_paper.py
      tests/test_mm_v2_paper_multiwindow.py
      tests/test_mm_v2_replay.py
    - docker image rm --force ${IMAGE_NAME}:test-${CI_PIPELINE_IID} || true


Build:
  stage: build
  needs:
    - job: Test
  tags:
    - shell
    - rabbit2
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - echo "$SMTH_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$SMTH_REGISTRY_USER" --password-stdin
    - >
      docker build -f Dockerfile --target production
      --build-arg GIT_HASH=${CI_COMMIT_SHORT_SHA}
      --tag ${IMAGE_NAME}:${CI_PIPELINE_IID}
      --label CI_PROJECT_ID=${CI_PROJECT_ID}
      .
    - docker push --quiet ${IMAGE_NAME}:${CI_PIPELINE_IID}
    - docker image prune --all --force --filter="label=CI_PROJECT_ID=${CI_PROJECT_ID}" --filter="until=1h"


Deploy:
  stage: deploy
  needs:
    - job: Build
  tags:
    - shell
    - polybot2
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  environment:
    name: prod
  variables:
    REF_FILE_VAR_PROD: $PROD_ENV
  script:
    - cat $REF_FILE_VAR_PROD > .env
    - echo "$SMTH_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$SMTH_REGISTRY_USER" --password-stdin
    - docker pull --quiet ${IMAGE_NAME}:${CI_PIPELINE_IID}
    - docker image tag ${IMAGE_NAME}:${CI_PIPELINE_IID} ${IMAGE_NAME}:${CI_ENVIRONMENT_NAME}
    - docker push --quiet ${IMAGE_NAME}:${CI_ENVIRONMENT_NAME}
    - docker stack deploy -c deploy_prod.yaml --with-registry-auth Prod-polymarketbot
