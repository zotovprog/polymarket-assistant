version: '3.8'

services:
  bot:
    image: ${IMAGE_NAME:-ghcr.io/your-org/polymarket-assistant:prod}
    env_file:
      - .env
    environment:
      - SERVICE_NAME=bot
    ports:
      - 8000:8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: pause
